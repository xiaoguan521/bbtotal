name: Mobile Packages

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-android-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GRADLE_OPTS: -Dorg.gradle.vfs.watch=false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Pub Packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Flutter Analyze
        run: flutter analyze

      - name: Build Android APK
        run: flutter build apk

      - name: Upload Android APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error

  build-ios-test-package:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Ensure iOS Platform Files
        run: |
          if [ ! -d ios/Runner.xcodeproj ]; then
            mkdir -p .ci-ios-backup/Runner
            mkdir -p .ci-ios-backup/test
            if [ -f ios/Runner/AppDelegate.swift ]; then
              cp ios/Runner/AppDelegate.swift .ci-ios-backup/Runner/AppDelegate.swift
            fi
            if [ -f ios/Runner/Info.plist ]; then
              cp ios/Runner/Info.plist .ci-ios-backup/Runner/Info.plist
            fi
            if [ -f test/widget_test.dart ]; then
              cp test/widget_test.dart .ci-ios-backup/test/widget_test.dart
            fi

            flutter create . --platforms=ios --org com.example --no-pub

            if [ -f .ci-ios-backup/Runner/AppDelegate.swift ]; then
              cp .ci-ios-backup/Runner/AppDelegate.swift ios/Runner/AppDelegate.swift
            fi
            if [ -f .ci-ios-backup/Runner/Info.plist ]; then
              cp .ci-ios-backup/Runner/Info.plist ios/Runner/Info.plist
            fi
            if [ -f .ci-ios-backup/test/widget_test.dart ]; then
              mkdir -p test
              cp .ci-ios-backup/test/widget_test.dart test/widget_test.dart
            else
              rm -f test/widget_test.dart
            fi
          fi

      - name: Cache Pub Packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Flutter Analyze
        run: flutter analyze

      - name: Build iOS Test Package
        run: flutter build ios --release --no-codesign

      - name: Package Unsigned IPA
        run: |
          mkdir -p build/ios/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/Payload/
          cd build/ios
          zip -r Runner-unsigned.ipa Payload

      - name: Upload iOS Test Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-package
          path: |
            build/ios/iphoneos/Runner.app
            build/ios/Runner-unsigned.ipa
          if-no-files-found: error
