name: Mobile Packages

on:
  workflow_dispatch:
    inputs:
      build_ios:
        description: Build iOS test package too
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GRADLE_OPTS: -Dorg.gradle.vfs.watch=false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Pub Packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Cache Android SDK Components
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/lib/android/sdk/cmake/3.22.1
            /usr/local/lib/android/sdk/licenses
          key: ${{ runner.os }}-android-sdk-cmake-3.22.1
          restore-keys: |
            ${{ runner.os }}-android-sdk-cmake-

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Flutter Analyze
        run: flutter analyze

  build-android-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: analyze
    if: github.event_name != 'pull_request'
    env:
      GRADLE_OPTS: -Dorg.gradle.vfs.watch=false
      ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/upload-keystore.jks
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Pub Packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Validate Android Release Signing Secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64" || { echo "Missing secret: ANDROID_KEYSTORE_BASE64"; exit 1; }
          test -n "$ANDROID_KEYSTORE_PASSWORD" || { echo "Missing secret: ANDROID_KEYSTORE_PASSWORD"; exit 1; }
          test -n "$ANDROID_KEY_ALIAS" || { echo "Missing secret: ANDROID_KEY_ALIAS"; exit 1; }
          test -n "$ANDROID_KEY_PASSWORD" || { echo "Missing secret: ANDROID_KEY_PASSWORD"; exit 1; }

      - name: Materialize Android Release Keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$ANDROID_KEYSTORE_PATH"

      - name: Build Signed Android Release APK
        run: flutter build apk --release

      - name: Upload Android APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  build-ios-test-package:
    runs-on: macos-latest
    timeout-minutes: 60
    needs: analyze
    if: github.event_name != 'workflow_dispatch' || inputs.build_ios

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Ensure iOS Platform Files
        run: |
          if [ ! -d ios/Runner.xcodeproj ]; then
            mkdir -p .ci-ios-backup/Runner
            mkdir -p .ci-ios-backup/test
            if [ -f ios/Runner/AppDelegate.swift ]; then
              cp ios/Runner/AppDelegate.swift .ci-ios-backup/Runner/AppDelegate.swift
            fi
            if [ -f ios/Runner/NativeCheckInWebViewFactory.swift ]; then
              cp ios/Runner/NativeCheckInWebViewFactory.swift .ci-ios-backup/Runner/NativeCheckInWebViewFactory.swift
            fi
            if [ -f ios/Runner/Info.plist ]; then
              cp ios/Runner/Info.plist .ci-ios-backup/Runner/Info.plist
            fi
            if [ -f test/widget_test.dart ]; then
              cp test/widget_test.dart .ci-ios-backup/test/widget_test.dart
            fi

            flutter create . --platforms=ios --org com.example --no-pub

            if [ -f .ci-ios-backup/Runner/AppDelegate.swift ]; then
              cp .ci-ios-backup/Runner/AppDelegate.swift ios/Runner/AppDelegate.swift
            fi
            if [ -f .ci-ios-backup/Runner/NativeCheckInWebViewFactory.swift ]; then
              cp .ci-ios-backup/Runner/NativeCheckInWebViewFactory.swift ios/Runner/NativeCheckInWebViewFactory.swift
            fi
            if [ -f .ci-ios-backup/Runner/Info.plist ]; then
              cp .ci-ios-backup/Runner/Info.plist ios/Runner/Info.plist
            fi
            if [ -f .ci-ios-backup/test/widget_test.dart ]; then
              mkdir -p test
              cp .ci-ios-backup/test/widget_test.dart test/widget_test.dart
            else
              rm -f test/widget_test.dart
            fi
          fi

      - name: Cache Pub Packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ~/.cocoapods
            ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-cocoapods-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-cocoapods-

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Build iOS Test Package
        run: flutter build ios --release --no-codesign

      - name: Package Unsigned IPA
        run: |
          mkdir -p build/ios/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/Payload/
          cd build/ios
          zip -r Runner-unsigned.ipa Payload

      - name: Upload iOS Test Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-package
          path: |
            build/ios/iphoneos/Runner.app
            build/ios/Runner-unsigned.ipa
          if-no-files-found: error
