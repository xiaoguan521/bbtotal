name: Mobile Packages

on:
  workflow_dispatch:
    inputs:
      android_build_mode:
        description: Android build mode
        required: false
        default: debug
        type: choice
        options:
          - debug
          - release
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GRADLE_OPTS: -Dorg.gradle.vfs.watch=false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Pub Packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Cache Android SDK Components
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/lib/android/sdk/cmake/3.22.1
            /usr/local/lib/android/sdk/licenses
          key: ${{ runner.os }}-android-sdk-cmake-3.22.1
          restore-keys: |
            ${{ runner.os }}-android-sdk-cmake-

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Flutter Analyze
        run: flutter analyze

  build-android-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: analyze
    if: github.event_name != 'pull_request'
    env:
      GRADLE_OPTS: -Dorg.gradle.vfs.watch=false
      ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/upload-keystore.jks
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Pub Packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Restore Android SDK Components Cache
        id: android_sdk_cache
        uses: actions/cache/restore@v4
        with:
          path: |
            /usr/local/lib/android/sdk/cmake/3.22.1
            /usr/local/lib/android/sdk/licenses
          key: ${{ runner.os }}-android-sdk-cmake-3.22.1
          restore-keys: |
            ${{ runner.os }}-android-sdk-cmake-

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Determine Android Build Mode
        id: build_mode
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            mode="${{ inputs.android_build_mode }}"
          else
            mode="release"
          fi

          case "$mode" in
            debug)
              echo "artifact_name=android-debug-apk" >> "$GITHUB_OUTPUT"
              echo "apk_path=build/app/outputs/flutter-apk/app-debug.apk" >> "$GITHUB_OUTPUT"
              ;;
            release)
              echo "artifact_name=android-release-apk" >> "$GITHUB_OUTPUT"
              echo "apk_path=build/app/outputs/flutter-apk/app-release.apk" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported build mode: $mode"
              exit 1
              ;;
          esac

          echo "build_mode=$mode" >> "$GITHUB_OUTPUT"

      - name: Validate Android Release Signing Secrets
        if: steps.build_mode.outputs.build_mode == 'release'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64" || { echo "Missing secret: ANDROID_KEYSTORE_BASE64"; exit 1; }
          test -n "$ANDROID_KEYSTORE_PASSWORD" || { echo "Missing secret: ANDROID_KEYSTORE_PASSWORD"; exit 1; }
          test -n "$ANDROID_KEY_ALIAS" || { echo "Missing secret: ANDROID_KEY_ALIAS"; exit 1; }
          test -n "$ANDROID_KEY_PASSWORD" || { echo "Missing secret: ANDROID_KEY_PASSWORD"; exit 1; }

      - name: Materialize Android Release Keystore
        if: steps.build_mode.outputs.build_mode == 'release'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$ANDROID_KEYSTORE_PATH"

      - name: Build Android APK
        run: flutter build apk --${{ steps.build_mode.outputs.build_mode }}

      - name: Save Android SDK Components Cache
        if: always() && steps.android_sdk_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            /usr/local/lib/android/sdk/cmake/3.22.1
            /usr/local/lib/android/sdk/licenses
          key: ${{ runner.os }}-android-sdk-cmake-3.22.1

      - name: Upload Android APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build_mode.outputs.artifact_name }}
          path: ${{ steps.build_mode.outputs.apk_path }}
          if-no-files-found: error
