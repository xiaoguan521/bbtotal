name: Remote Bridge Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - remote-bridge/**
      - .github/workflows/remote-bridge-pages.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: remote-bridge-pages
  cancel-in-progress: true

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Manifest
        shell: bash
        run: |
          test -f remote-bridge/manifest.json
          test -f remote-bridge/remote_bridge_bundle.js
          python3 - <<'PY'
          import json
          from pathlib import Path
          manifest = json.loads(Path("remote-bridge/manifest.json").read_text())
          if not manifest.get("version"):
              raise SystemExit("manifest.version is required")
          if not manifest.get("scriptUrl") and not manifest.get("script"):
              raise SystemExit("manifest.scriptUrl or manifest.script is required")
          PY

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: remote-bridge

      - name: Deploy To GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
